<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amori · Как это работает</title>
<style>
  :root{--bg:#0A0D11;--panel:#11151B;--panel2:#161B22;--border:#21262D;--fg:#E6EDF3;
    --muted:#7d8aa3;--accent:#5b8cff;--green:#56D364;--cyan:#79C0FF;--purple:#D2A8FF;}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--fg);font:15px/1.7 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
  header{position:sticky;top:0;z-index:50;background:rgba(10,13,17,.9);backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border);padding:14px 0}
  .hd{max-width:900px;margin:0 auto;padding:0 24px;display:flex;align-items:center;gap:14px}
  .logo{font-size:18px;font-weight:800}.logo span{color:var(--accent)}
  .spacer{flex:1}
  a.btn{cursor:pointer;background:var(--accent);color:#fff;text-decoration:none;padding:7px 14px;
    border-radius:8px;font-weight:600;font-size:13px}
  .md{max-width:900px;margin:0 auto;padding:30px 24px 80px}
  .md h1{font-size:28px;margin:8px 0 18px;font-weight:800}
  .md h2{font-size:21px;margin:34px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border);color:var(--cyan)}
  .md h3{font-size:16px;margin:22px 0 10px;color:var(--purple)}
  .md p{margin:10px 0}
  .md ul,.md ol{margin:10px 0 10px 26px}.md li{margin:5px 0}
  .md code{background:var(--panel2);padding:2px 6px;border-radius:5px;font-family:ui-monospace,monospace;font-size:13px;color:var(--cyan)}
  .md pre{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;
    overflow:auto;margin:14px 0}
  .md pre code{background:none;padding:0;color:var(--fg);font-size:12.5px;line-height:1.6}
  .md table{width:100%;border-collapse:collapse;margin:14px 0;font-size:13.5px}
  .md th{background:var(--panel2);text-align:left;padding:9px 12px;border:1px solid var(--border);font-weight:700}
  .md td{padding:9px 12px;border:1px solid var(--border);vertical-align:top}
  .md tr:nth-child(even) td{background:rgba(22,27,34,.4)}
  .md blockquote{border-left:3px solid var(--accent);background:var(--panel);padding:10px 16px;margin:14px 0;
    color:var(--muted);border-radius:0 8px 8px 0}
  .md hr{border:none;border-top:1px solid var(--border);margin:28px 0}
  .md strong{color:var(--fg);font-weight:700}
  .md a{color:var(--accent)}
  .loading{max-width:900px;margin:0 auto;padding:60px 24px;color:var(--muted)}
</style>
</head>
<body>
<header><div class="hd">
  <div class="logo">⚙️ Amori <span>Infra</span> · 📖 Как это работает</div>
  <div class="spacer"></div>
  <a class="btn" href="/">← Дашборд</a>
</div></header>
<div class="md" id="md"><div class="loading">Загрузка документа…</div></div>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
(async function(){
  const el=document.getElementById('md');
  try{
    const r=await fetch('/api/docs'); const txt=await r.text();
    if(window.marked){ el.innerHTML=marked.parse(txt); }
    else { const pre=document.createElement('pre'); pre.textContent=txt; el.innerHTML=''; el.appendChild(pre); }
  }catch(e){ el.innerHTML='<p style="color:#FF7B72">Не удалось загрузить документ: '+e.message+'</p>'; }
})();
</script>
</body>
</html>
